<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <title>Terremotos</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/x-icon" href="./assets/terremoto.png" />
  </head>

  <body>
    <header>
      <h1>Mapa de terremotos</h1>
    </header>

    <main>

      <section>
        <h2>Usuario</h2>
        <div>
          <h3>Registro</h3>
          <form id="register-form">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" required />

            <label for="register-password">Contraseña</label>
            <input type="password" id="register-password" required />

            <label for="register-password-repeat">Repetir contraseña</label>
            <input type="password" id="register-password-repeat" required />

            <button type="submit">Registrarse</button>
          </form>
        </div>

        <div>
          <h3>Login</h3>
          <form id="login-form">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required />

            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" required />

            <button type="submit">Iniciar sesión</button>
          </form>
        </div>

        <div id="user-info">
          <h3>Estado</h3>
          <p>No hay usuario conectado</p>
        </div>
      </section>

      <!-- Añado botones para mostrar todos o favoritos-->
      <section class="options">
        <h2>Opciones</h2>
        <button id="show-api">Mostrar terremotos</button>
        <button id="show-favorites">Mostrar favoritos</button>
      </section>

      <!-- Aquí mapa general -->
      <section>
        <h2>Mapa general</h2>
        <div id="map"></div>
      </section>

      <!-- Aquí mapa filtrado -->
      <section>
        <h2>Mapa filtrado</h2>

        <form id="filter-form">
          <div class="filter-group">
            <label for="min-magnitude">Magnitud mínima</label>
            <input type="number" id="min-magnitude" min="0" step="0.1" />
          </div>

          <div class="filter-group">
            <label for="max-magnitude">Magnitud máxima</label>
            <input type="number" id="max-magnitude" min="0" step="0.1" />
          </div>

          <div class="filter-group">
            <label for="start-date">Fecha inicio</label>
            <input type="date" id="start-date" />
          </div>

          <div class="filter-group">
            <label for="end-date">Fecha fin</label>
            <input type="date" id="end-date" />
          </div>

          <div class="button-group">
            <button type="submit" id="filter-btn">Filtrar</button>
          </div>
        </form>

        <div id="filtered-map"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Caja de Películas</p>
    </footer>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script src="./scripts.js"></script>
  </body>
</html>
