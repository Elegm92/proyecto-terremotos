<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <title>Mapa de terremotos</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <header>
      <h1>Mapa de terremotos</h1>
    </header>

    <main>
      <!-- USUARIO -->
      <section>
        <h2>Usuario</h2>

        <div>
          <h3>Registro</h3>
          <form id="register-form">
            <label>Email</label>
            <input type="email" id="register-email" required />

            <label>Contraseña</label>
            <input type="password" id="register-password" required />

            <label>Repetir contraseña</label>
            <input type="password" id="register-password-repeat" required />

            <button type="submit">Registrarse</button>
          </form>
        </div>

        <div>
          <h3>Login</h3>
          <form id="login-form">
            <label>Email</label>
            <input type="email" id="login-email" required />

            <label>Contraseña</label>
            <input type="password" id="login-password" required />

            <button type="submit">Iniciar sesión</button>
          </form>
        </div>

        <div id="user-info">
          <h3>Estado</h3>
          <p>No hay usuario conectado</p>
        </div>
      </section>

      <!-- BOTONES -->
      <section>
        <h2>Opciones</h2>
        <button id="show-api">Mostrar terremotos</button>
        <button id="show-favorites">Mostrar favoritos</button>
      </section>

      <!-- MAPA GENERAL -->
      <section>
        <h2>Mapa general</h2>
        <div id="map"></div>
      </section>

      <!-- MAPA FILTRADO -->
      <section>
        <h2>Mapa filtrado</h2>

        <!-- 🔥 FILTROS EN FILA -->
        <form id="filter-form">
          <div class="filter-group">
            <label>Magnitud mínima</label>
            <input type="number" id="min-magnitude" step="0.1" />
          </div>

          <div class="filter-group">
            <label>Magnitud máxima</label>
            <input type="number" id="max-magnitude" step="0.1" />
          </div>

          <div class="filter-group">
            <label>Fecha inicio</label>
            <input type="date" id="start-date" />
          </div>

          <div class="filter-group">
            <label>Fecha fin</label>
            <input type="date" id="end-date" />
          </div>

          <div class="filter-group button-group">
            <button type="submit" id="filter-btn">Filtrar</button>
          </div>
        </form>

        <div id="filtered-map"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mapa de terremotos</p>
    </footer>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script src="./scripts.js"></script>
  </body>
</html>
